<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grocery List</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="homePage" class="page active">
  <div class="hero">
    <div class="hero-small">Your smart shopping space ✨</div>
    <div class="hero-title">Grocery List</div>
    <div class="hero-sub">Shopping companion</div>
  </div>

  <div class="create-card">
    <input id="listInput" placeholder="Name your list"/>
    <button onclick="createList()">Create</button>
  </div>

  <div id="activeLists"></div>
</div>

<div id="historyPage" class="page">
  <div class="page-title">History</div>
  <div id="historyLists"></div>
</div>

<div class="bottom-nav">
  <button onclick="showPage('homePage')">⌂</button>
  <button onclick="showPage('homePage')">☰</button>
  <button onclick="showPage('homePage')">✦</button>
  <button onclick="showPage('historyPage')">◷</button>
</div>

<script src="app.js"></script>
</body>
</html>
