<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groovy Lists</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<div id="homePage">

<div class="hero-card">
<div class="hero-content">
<h1>Groovy Lists ✨</h1>
<p>Your cozy family shopping companion</p>
</div>
</div>

<div class="create-row">
<input id="listName" placeholder="Create a new list">
<button onclick="createList()">+</button>
</div>

<div id="listsContainer" class="lists-grid"></div>

</div>

<div id="detailsPage" style="display:none;">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">←</button>
<h2 id="currentListName"></h2>
</div>

<div class="input-card">

<div class="row-top">
<input id="itemName" placeholder="Item name">

<input id="qty" type="number" placeholder="Qty">

<select id="unit">
<option>kg</option>
<option>g</option>
<option>litre</option>
<option>ml</option>
<option>pcs</option>
<option>packet</option>
<option>dozen</option>
</select>
</div>

<div class="row-bottom">
<input id="brand" placeholder="Brand">
<button class="add-btn" onclick="addItem()">Add</button>
</div>

</div>

<div id="itemsContainer"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
