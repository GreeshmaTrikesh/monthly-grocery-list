
<!DOCTYPE html>
<html>
<head>
<meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1'>
<title>Grocery List</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>

<div id='toast' class='toast'></div>

<section id='home' class='page active'>
<div class='hero'>
<small>Your smart shopping space ✨</small>
<h1>Grocery List</h1>
<p>Shopping companion</p>
</div>

<div class='card create-card'>
<input id='listName' placeholder='Name your list'>
<button class='primary' onclick='createList()'>Create</button>
</div>

<div id='homeLists'></div>
</section>

<section id='lists' class='page'>
<div id='listsWrap'></div>
</section>

<section id='history' class='page'>
<h2>History</h2>
<div id='historyWrap'></div>
</section>

<section id='detail' class='page'>
<div class='topbar'>
<button class='back' onclick='openPage("lists")'>←</button>
<div class='title' id='title'></div>
</div>

<div class='card progress'>
<div>
<h4>Shopping Progress</h4>
<strong id='progressText'></strong>
</div>
<div class='ring' id='ring'><span id='percent'>0%</span></div>
</div>

<div class='card add-box'>
<input id='item' placeholder='Item'>

<div class='qty'>
<button onclick='qty(-1)'>−</button>
<div id='qv'>1</div>
<button onclick='qty(1)'>+</button>
</div>

<div class='units'>
<div class='unit active' onclick='unit(this,"kg")'>kg</div>
<div class='unit' onclick='unit(this,"g")'>g</div>
<div class='unit' onclick='unit(this,"L")'>L</div>
<div class='unit' onclick='unit(this,"pcs")'>pcs</div>
</div>

<input id='brand' placeholder='Brand (optional)'>
<button class='primary' onclick='addItem()'>Add Item</button>
</div>

<div id='items'></div>

<div class='card finish-card'>
<h2>Finish Shopping</h2>
<div class='muted'>Move list to history</div><br>
<button class='primary' onclick='finishShopping()'>Finish</button>
</div>
</section>

<div class='bottom'>
<button class='nav active' onclick='tab("home",this)'>⌂</button>
<button class='nav' onclick='tab("lists",this)'>☰</button>
<button class='nav' onclick='tab("history",this)'>◷</button>
</div>

<script src='app.js'></script>
</body>
</html>
