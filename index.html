<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Grocery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div id="homePage">

<div class="header">
<h1>🛒 Family Grocery</h1>
<p>Your reusable shopping lists</p>
</div>

<div class="create-row">
<input id="listName" class="small-input" placeholder="New list">
<button class="small-create-btn" onclick="createList()">+</button>
</div>

<div id="listsContainer"></div>

</div>

<div id="detailsPage" style="display:none;">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">←</button>
<h2 id="currentListName"></h2>
</div>

<div class="card">

<div class="item-form-row">
<input id="itemName" placeholder="Item">

<input id="qty" type="number" placeholder="Qty">

<select id="unit">
<option>kg</option>
<option>g</option>
<option>litre</option>
<option>ml</option>
<option>pcs</option>
<option>packet</option>
<option>dozen</option>
</select>
</div>

<div class="brand-row">
<input id="brand" placeholder="Brand">
<button class="add-btn" onclick="addItem()">Add</button>
</div>

</div>

<div id="itemsContainer"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
