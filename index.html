<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grocery List</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="toast" class="toast"></div>

<section id="homePage" class="page active">

<div class="hero-card">
<div class="hero-glow one"></div>
<div class="hero-glow two"></div>

<div class="hero-top">
<div class="hero-badge">✨ Smart Shopping</div>
</div>

<h1>Grocery List</h1>
<p>Your elegant shopping companion</p>

<div class="hero-stats">
<div class="stat">
<strong id="activeCount">0</strong>
<span>Active</span>
</div>

<div class="stat">
<strong id="historyCount">0</strong>
<span>History</span>
</div>
</div>
</div>

<div class="create-card">
<input id="listInput" placeholder="Create a new list">
<button onclick="createList()">Create</button>
</div>

<div class="section-label">Recent List</div>
<div id="homeList"></div>

</section>

<section id="listsPage" class="page">
<div class="page-title">Active Lists</div>
<div id="listsContainer"></div>
</section>

<section id="historyPage" class="page">
<div class="page-title">History</div>
<div id="historyContainer"></div>
</section>

<section id="detailPage" class="page">

<div class="detail-topbar">
<button class="back-btn" onclick="openPage('listsPage')">←</button>
<div class="detail-title" id="detailTitle"></div>
</div>

<div class="progress-card">
<div>
<div class="tiny-label">Shopping Progress</div>
<div class="progress-text" id="progressText">0 / 0 completed</div>
</div>

<div class="ring" id="ring">
<div id="ringText">0%</div>
</div>
</div>

<div class="add-card">
<input id="itemInput" placeholder="Item">

<div class="quantity-row">
<button onclick="changeQty(-1)">−</button>
<div id="qtyValue">1</div>
<button onclick="changeQty(1)">+</button>
</div>

<div class="units">
<div class="unit active" onclick="selectUnit(this,'kg')">kg</div>
<div class="unit" onclick="selectUnit(this,'g')">g</div>
<div class="unit" onclick="selectUnit(this,'L')">L</div>
<div class="unit" onclick="selectUnit(this,'pcs')">pcs</div>
</div>

<input id="brandInput" placeholder="Brand (optional)">

<button class="primary-btn" onclick="addItem()">Add Item</button>
</div>

<div id="itemsContainer"></div>

<div class="finish-card">
<div>
<div class="finish-title">Finish Shopping</div>
<div class="tiny-label">Move list to history</div>
</div>

<button class="primary-btn" onclick="finishShopping()">Finish</button>
</div>

</section>

<div class="floating-nav">
<button class="nav active" onclick="switchTab('homePage',this)">⌂</button>
<button class="nav" onclick="switchTab('listsPage',this)">☰</button>
<button class="nav" onclick="switchTab('historyPage',this)">◷</button>
</div>

<script src="app.js"></script>
</body>
</html>
