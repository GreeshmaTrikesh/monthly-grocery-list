<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<div class="side-rail">
<div class="rail-icon active" onclick="showPage('homePage',this)">🏠</div>
<div class="rail-icon" onclick="showPage('historyPage',this)">🕘</div>
</div>

<div class="app">

<div id="homePage">

<div class="hero-card">
<div>
<div class="hero-top">Good Evening 🌿</div>
<h1>Grocery List</h1>
<p>Your shopping companion</p>

<div class="quick-chips">
<div class="chip">+ Milk</div>
<div class="chip">+ Rice</div>
<div class="chip">+ Eggs</div>
</div>
</div>

<div class="hero-circle"></div>
</div>

<div class="section-title">
<div>Monthly Lists</div>
</div>

<div class="horizontal-lists" id="listsContainer"></div>

<div class="create-panel">
<input id="listName" placeholder="Create monthly list">
<button onclick="createList()">Create</button>
</div>

</div>

<div id="detailsPage" style="display:none;">

<div class="top-bar">
<button class="back-btn" onclick="backHome()">←</button>
<input id="currentListName" class="editable-title" onchange="updateListName()">
</div>

<div class="progress-card">
<div>
<div class="progress-title">Shopping Progress</div>
<div id="progressText">0 / 0 completed</div>
</div>

<div class="progress-ring">
<div id="progressPercent">0%</div>
</div>
</div>

<div class="input-card">

<input id="itemName" list="items" placeholder="Item name">

<datalist id="items">
<option>Rice</option>
<option>Milk</option>
<option>Oil</option>
<option>Eggs</option>
<option>Bread</option>
</datalist>

<div class="qty-row">

<div class="stepper">
<button onclick="changeQty(-1)">−</button>
<div id="qtyValue">1</div>
<button onclick="changeQty(1)">+</button>
</div>

<div class="unit-pills">
<button class="unit-pill active" onclick="selectUnit(this,'kg')">kg</button>
<button class="unit-pill" onclick="selectUnit(this,'g')">g</button>
<button class="unit-pill" onclick="selectUnit(this,'L')">L</button>
<button class="unit-pill" onclick="selectUnit(this,'pcs')">pcs</button>
</div>

</div>

<div class="bottom-row">

<input id="brand" list="brands" placeholder="Brand">

<datalist id="brands">
<option>India Gate</option>
<option>Fortune</option>
<option>Amul</option>
<option>Tata</option>
</datalist>

<button class="add-btn" onclick="addItem()">Add</button>

</div>

</div>

<div id="itemsContainer"></div>

<div class="completed-wrapper">

<div class="completed-header" onclick="toggleCompletedSection()">
<div>Completed Items</div>
<div id="completedArrow">⌄</div>
</div>

<div id="completedContainer"></div>

</div>

<div class="finish-card">

<div>
<div class="finish-title">Finish Shopping</div>
<div class="finish-sub">Save this month to history</div>
</div>

<button class="finish-btn" onclick="finishShopping()">Finish</button>

</div>

</div>

<div id="historyPage" style="display:none;">

<div class="history-header">
<h1>History ✨</h1>
<p>Last 2 shopping sessions</p>
</div>

<div id="historyContainer"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
