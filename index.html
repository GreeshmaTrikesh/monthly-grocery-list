<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grocery List</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar">
<div class="side-item active" onclick="showPage('homePage',this)">🏠<span>Home</span></div>
<div class="side-item" onclick="showPage('listsPage',this)">📋<span>Lists</span></div>
<div class="side-item" onclick="showPage('historyPage',this)">🕘<span>History</span></div>
</div>

<div class="app">

<div id="homePage">
<div class="hero-card">
<div>
<div class="hero-mini">Your Smart Shopping Space ✨</div>
<h1>Grocery List</h1>
<p>Monthly grocery companion</p>
</div>
</div>

<div class="create-card">
<select id="monthSelect">
<option value="">Select Month</option>
<option>January 2026</option>
<option>February 2026</option>
<option>March 2026</option>
<option>April 2026</option>
<option>May 2026</option>
<option>June 2026</option>
<option>Custom</option>
</select>

<input id="listName" placeholder="Name your list">

<button class="primary-btn" onclick="createList()">Create List</button>
</div>

<div id="homeLists" class="lists-grid"></div>
</div>

<div id="listsPage" style="display:none;">
<div class="page-title">Active Lists</div>
<div id="listsContainer" class="lists-grid"></div>
<div id="emptyLists" class="empty-state" style="display:none;">
No active lists available ✨
</div>
</div>

<div id="detailsPage" style="display:none;">
<div class="top-bar">
<button class="back-btn" onclick="showPage('listsPage')">←</button>
<input id="currentListTitle" class="editable-title" onchange="renameList()">
</div>

<div class="card progress-card">
<div>
<div class="small-text">Shopping Progress</div>
<div id="progressText">0 / 0 completed</div>
</div>

<div class="progress-ring">
<div id="progressPercent">0%</div>
</div>
</div>

<div class="card">
<input id="itemName" placeholder="Item">

<div class="qty-row">
<div class="stepper">
<button onclick="changeQty(-1)">−</button>
<div id="qtyValue">1</div>
<button onclick="changeQty(1)">+</button>
</div>

<div class="units">
<button class="unit active" onclick="setUnit(this,'kg')">kg</button>
<button class="unit" onclick="setUnit(this,'g')">g</button>
<button class="unit" onclick="setUnit(this,'L')">L</button>
<button class="unit" onclick="setUnit(this,'pcs')">pcs</button>
</div>
</div>

<input id="brand" placeholder="Brand (optional)">

<button class="primary-btn" onclick="addItem()">Add Item</button>
</div>

<div id="itemsContainer"></div>

<div class="card finish-card">
<div>
<div class="finish-title">Finish Shopping</div>
<div class="small-text">Move list to history</div>
</div>

<button class="primary-btn small-btn" onclick="finishShopping()">Finish</button>
</div>
</div>

<div id="historyPage" style="display:none;">
<div class="page-title">History ✨</div>
<div id="historyContainer"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
