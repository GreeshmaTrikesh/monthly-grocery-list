<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<div id="homePage">

<div class="hero-card">
<div class="hero-content">
<div class="hero-emoji">🛒 ✨ 🥛</div>
<h1>Grocery List</h1>
<p>Your shopping companion</p>
</div>
</div>

<div class="create-row">
<input id="listName" placeholder="Create a new list">
<button onclick="createList()">+</button>
</div>

<div id="listsContainer" class="lists-grid"></div>

</div>

<div id="detailsPage" style="display:none;">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">←</button>
<input id="currentListName" class="editable-title" onchange="updateListName()">
</div>

<div class="progress-card">
<div>
<div class="progress-title">Shopping Progress</div>
<div id="progressText" class="progress-subtitle">0 / 0 completed</div>
</div>

<div class="progress-ring">
<div id="progressPercent">0%</div>
</div>
</div>

<div class="input-card">

<div class="row-top">
<input id="itemName" placeholder="Item name">

<input id="qty" type="number" placeholder="Qty">
</div>

<div class="unit-pills">
<button class="unit-pill active" onclick="selectUnit(this,'kg')">kg</button>
<button class="unit-pill" onclick="selectUnit(this,'g')">g</button>
<button class="unit-pill" onclick="selectUnit(this,'litre')">L</button>
<button class="unit-pill" onclick="selectUnit(this,'pcs')">pcs</button>
<button class="unit-pill" onclick="selectUnit(this,'packet')">pack</button>
</div>

<div class="row-bottom">
<input id="brand" list="brands" placeholder="Brand">
<datalist id="brands">
<option>India Gate</option>
<option>Aashirvaad</option>
<option>Fortune</option>
<option>Tata Salt</option>
<option>Surf Excel</option>
<option>Dove</option>
<option>Amul</option>
<option>DMart Premia</option>
<option>Harpic</option>
<option>Good Life</option>
</datalist>

<button class="add-btn" onclick="addItem()">Add</button>
</div>

</div>

<div id="itemsContainer"></div>

<div class="completed-section">
<div class="completed-title">Completed Items</div>
<div id="completedContainer"></div>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
