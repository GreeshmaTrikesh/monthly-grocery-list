
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero">
<div class="chip">✨ Smart Shopping</div>
<h1>Grocery List</h1>

</div>

<div class="card">

</div>

</div>

<div class="nav">

<button>✦</button>
<button>◷</button>
</div>
</body>
</html>
