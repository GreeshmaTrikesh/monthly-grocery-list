
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grocery List</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar">
<div class="side-item active" onclick="showPage('homePage',this)">🏠<span>Home</span></div>
<div class="side-item" onclick="showPage('detailsPage',this)">🛒<span>Lists</span></div>
<div class="side-item" onclick="showPage('historyPage',this)">🕘<span>History</span></div>
</div>

<div class="app">

<div id="homePage">

<div class="hero-card">
<div class="hero-overlay"></div>

<div class="hero-content">
<div class="hero-mini">Your Smart Shopping Space ✨</div>

<h1>Grocery List</h1>

<p>Premium monthly grocery companion</p>

<button class="hero-btn">
Continue Shopping
</button>
</div>

<div class="hero-blob"></div>

</div>

<div class="floating-card">
<div class="floating-title">Create Monthly List</div>

<select id="monthSelect">
<option value="">Select Month</option>
<option>January 2026</option>
<option>February 2026</option>
<option>March 2026</option>
<option>April 2026</option>
<option>May 2026</option>
<option>June 2026</option>
<option>July 2026</option>
<option>August 2026</option>
<option>September 2026</option>
<option>October 2026</option>
<option>November 2026</option>
<option>December 2026</option>
<option>Custom</option>
</select>

<input id="listName" placeholder="Or type custom list">

<button class="create-btn" onclick="createList()">
Create List
</button>
</div>

<div id="listsContainer" class="lists-grid"></div>

</div>

<div id="detailsPage" style="display:none;">

<div class="page-header">
<h1 id="currentListNameHeader">Shopping</h1>
</div>

<div class="premium-card progress-card">

<div>
<div class="small-label">Shopping Progress</div>
<div id="progressText">0 / 0 completed</div>
</div>

<div class="progress-ring">
<div id="progressPercent">0%</div>
</div>

</div>

<div class="premium-card">

<input id="itemName" placeholder="Item">

<div class="stepper-row">

<div class="stepper">
<button onclick="changeQty(-1)">−</button>
<div id="qtyValue">1</div>
<button onclick="changeQty(1)">+</button>
</div>

<div class="unit-scroll">
<button class="unit-pill active" onclick="selectUnit(this,'kg')">kg</button>
<button class="unit-pill" onclick="selectUnit(this,'g')">g</button>
<button class="unit-pill" onclick="selectUnit(this,'L')">L</button>
<button class="unit-pill" onclick="selectUnit(this,'pcs')">pcs</button>
</div>

</div>

<input id="brand" placeholder="Brand">

<button class="create-btn" onclick="addItem()">
Add Item
</button>

</div>

<div id="itemsContainer"></div>

<div class="premium-card finish-card">
<div>
<div class="finish-title">Finish Shopping</div>
<div class="finish-sub">Move list to history</div>
</div>

<button class="dark-btn" onclick="finishShopping()">
Finish
</button>
</div>

</div>

<div id="historyPage" style="display:none;">

<div class="page-header">
<h1>History ✨</h1>
</div>

<div id="historyContainer"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
